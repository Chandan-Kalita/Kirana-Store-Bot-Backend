# Built by terraform/cloudbuild.tf's google_cloudbuild_trigger on every
# push to the deploy branch. Substitution defaults below must stay in sync
# with terraform/variables.tf (service_name, artifact_repo_id, region).
substitutions:
  _REGION: asia-southeast1
  _REPO: kirana-store
  _SERVICE_NAME: kirana-store-agent

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$SHORT_SHA'
      - .

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$SHORT_SHA'
      - '--region=${_REGION}'
      - --quiet

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
